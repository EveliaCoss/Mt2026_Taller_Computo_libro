project:
  type: book
  output-dir: docs #docs _book

book:
  title: "Taller de Cómputo"
  site-url: https://eveliacoss.github.io/Workshop2026_scRNAseq_CITEseq_libro/
  page-footer:  "Taller de Cómputo, 1er semestre: Dra. Evelia Coss" 
  author: 
    - name: Evelia Coss
      degrees: PhD
      url: https://eveliacoss.github.io/ 
      orcid: https://orcid.org/0000-0002-7087-2977
      email: ecosnav@gmail.com
      affiliations:
        - name: ENES, Juriquilla - UNAM
          country: Mexico
          url: https://www.enesjuriquilla.unam.mx/
  
  date: "07/08/2026"
  page-navigation: true        # Provide next and previous article links in footer
  back-to-top-navigation: true # Provide a ‘back to top’ navigation button
  chapters:
    - index.qmd
    - temario.qmd
    - cap1.qmd
    - cap2.qmd
    - part: "**Introducción a Bash**"
      chapters: 
        - cap3.qmd
        - cap4.qmd
    - part: "**Introducción a Python**"
      chapters: 
        - cap5.qmd
  appendices: 
    - cap6.qmd
    - cap7.qmd
    - resources.qmd
    - notas.qmd
  # Information
  repo-url: https://github.com/EveliaCoss/Workshop2026_scRNAseq_CITEseq_libro # link de Github
  sharing: [twitter, facebook, linkedin]
  favicon: "enesLogo.png" # icono de la pagina en pestana


format:
  html:
    toc-depth: 4
    number-depth: 3
    # css
    css: styles.css
    linkcolor: "#007f99"
    
  # Boton para cambiar tema de oscuro a claro
    theme:
      light: cosmo
      # dark: darkly
    code-fold: show # Ocultar codigo
    code-copy: true # Copy button
    code-line-numbers: false #Numero de lineas
    code-annotations: hover #c(hover, below, select): posicion https://quarto.org/docs/authoring/code-annotation.html
    code-block-bg: true # Bloque de código
    code-block-border-left: "#007f99" # color del borde izquierdo del codigo
    syntax-highlighting: arrow # Estilo de los codigos https://quarto.org/docs/output-formats/html-code.html#highlighting
    freeze: false  # Desactivar congelamiento

editor: visual

lang: es

execute:
  error: true # Se aceptan errores
  message: false # Silenciar mensajes de salida
  echo: true

